<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1800 2400" role="img" aria-labelledby="title desc">
  <title id="title">ZF Lab Scientific Identity System</title>
  <desc id="desc">Filled-circle badge system for ZF Lab: master mark, favicon, and 25-project badge family with category colors.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .panel { fill: #ffffff; stroke: #e2e8f0; stroke-width: 2; }
      .soft { fill: #f8fafc; stroke: #e2e8f0; stroke-width: 2; }
      .darkPanel { fill: #0f172a; }
      .rule { stroke: #e2e8f0; stroke-width: 2; }
      .title { font: 700 46px Inter, Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 20px Inter, Arial, sans-serif; fill: #475569; }
      .section { font: 700 24px Inter, Arial, sans-serif; fill: #0f172a; }
      .body { font: 500 18px Inter, Arial, sans-serif; fill: #475569; }
      .small { font: 500 15px Inter, Arial, sans-serif; fill: #64748b; }
      .label { font: 600 15px Inter, Arial, sans-serif; fill: #475569; text-anchor: middle; }
      .labelDark { font: 600 15px Inter, Arial, sans-serif; fill: #cbd5e1; text-anchor: middle; }
      .legend { font: 600 16px Inter, Arial, sans-serif; fill: #334155; }
      .badgeCode { font: 700 44px 'JetBrains Mono', 'IBM Plex Mono', Menlo, Consolas, monospace; fill: #ffffff; text-anchor: middle; dominant-baseline: central; }
      .badgeName { font: 700 18px Inter, Arial, sans-serif; fill: #0f172a; text-anchor: middle; }
      .badgeMeta { font: 500 14px Inter, Arial, sans-serif; fill: #64748b; text-anchor: middle; }
    </style>

    <g id="badgeShell_pub">
      <circle cx="0" cy="0" r="62" fill="#1e3a5f"/>
      <circle cx="0" cy="0" r="60" fill="none" stroke="#2e5f8f" stroke-width="2.5"/>
      <path d="M-46 -16 C-30 -16, -18 -38, 0 -38 C16 -38, 30 -16, 46 -16" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="-46" cy="-16" r="4" fill="#6ba3e8"/>
      <circle cx="46" cy="-16" r="4" fill="#6ba3e8"/>
    </g>

    <g id="badgeShell_dev">
      <circle cx="0" cy="0" r="62" fill="#334155"/>
      <circle cx="0" cy="0" r="60" fill="none" stroke="#475569" stroke-width="2.5"/>
      <path d="M-46 -16 C-30 -16, -18 -38, 0 -38 C16 -38, 30 -16, 46 -16" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="-46" cy="-16" r="4" fill="#94a3b8"/>
      <circle cx="46" cy="-16" r="4" fill="#94a3b8"/>
    </g>

    <g id="badgeShell_web">
      <circle cx="0" cy="0" r="62" fill="#1e3a8a"/>
      <circle cx="0" cy="0" r="60" fill="none" stroke="#3451b2" stroke-width="2.5"/>
      <path d="M-46 -16 C-30 -16, -18 -38, 0 -38 C16 -38, 30 -16, 46 -16" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="-46" cy="-16" r="4" fill="#818cf8"/>
      <circle cx="46" cy="-16" r="4" fill="#818cf8"/>
    </g>

    <g id="badgeShell_ember">
      <circle cx="0" cy="0" r="62" fill="#78350f"/>
      <circle cx="0" cy="0" r="60" fill="none" stroke="#a16207" stroke-width="2.5"/>
      <path d="M-46 -16 C-30 -16, -18 -38, 0 -38 C16 -38, 30 -16, 46 -16" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="3.5" stroke-linecap="round"/>
      <circle cx="-46" cy="-16" r="4" fill="#fbbf24"/>
      <circle cx="46" cy="-16" r="4" fill="#fbbf24"/>
    </g>

    <g id="faviconMark">
      <circle cx="0" cy="0" r="62" fill="#1e3a5f"/>
      <circle cx="0" cy="0" r="60" fill="none" stroke="#2e5f8f" stroke-width="2.5"/>
      <path d="M-42 -14 C-26 -14, -14 -38, 0 -38 C14 -38, 28 -14, 42 -14" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="4.5" stroke-linecap="round"/>
      <circle cx="-42" cy="-14" r="4.5" fill="#6ba3e8"/>
      <circle cx="42" cy="-14" r="4.5" fill="#6ba3e8"/>
    </g>

    <g id="badgeTile">
      <rect x="-90" y="-90" width="180" height="180" rx="24" class="soft"/>
    </g>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="2400"/>

  <text x="100" y="94" class="title">ZF Lab  Scientific Identity System</text>
  <text x="100" y="130" class="subtitle">Filled-circle badge system. Dark backgrounds, white internals. Scalable from 16px favicon to 128px badge.</text>
  <line x1="100" y1="165" x2="1700" y2="165" class="rule"/>

  <text x="100" y="220" class="section">Master badge</text>
  <text x="100" y="252" class="body">Filled dark circle with trajectory arc and 2-letter code in bold white monospace. Reads on any background.</text>

  <g transform="translate(250 385)">
    <use href="#badgeTile"/>
    <use href="#badgeShell_pub"/><text x="0" y="14" class="badgeCode">ZF</text>
    <text x="0" y="116" class="label">Published  #1e3a5f</text>
  </g>
  <g transform="translate(510 385)">
    <use href="#badgeTile"/>
    <use href="#badgeShell_dev"/><text x="0" y="14" class="badgeCode">ZF</text>
    <text x="0" y="116" class="label">Dev  #334155</text>
  </g>
  <g transform="translate(770 385)">
    <use href="#badgeTile"/>
    <use href="#badgeShell_web"/><text x="0" y="14" class="badgeCode">ZF</text>
    <text x="0" y="116" class="label">Web  #1e3a8a</text>
  </g>
  <g transform="translate(1030 385)">
    <use href="#badgeTile"/>
    <use href="#badgeShell_ember"/><text x="0" y="14" class="badgeCode">ZF</text>
    <text x="0" y="116" class="label">Ember  #78350f</text>
  </g>

  <text x="1290" y="220" class="section">Favicon</text>
  <text x="1290" y="252" class="body">Reduced mark for browser tabs and small UI.</text>

  <g transform="translate(1395 370)">
    <rect x="-56" y="-56" width="112" height="112" rx="18" class="panel"/>
    <g transform="scale(0.5)"><use href="#faviconMark"/></g>
    <text x="0" y="86" class="label">16px</text>
  </g>
  <g transform="translate(1570 370)">
    <rect x="-72" y="-72" width="144" height="144" rx="20" class="panel"/>
    <g transform="scale(0.68)"><use href="#faviconMark"/></g>
    <text x="0" y="104" class="label">32px</text>
  </g>

  <g transform="translate(1290 500)">
    <text x="0" y="0" class="body">Minimum rules</text>
    <text x="0" y="34" class="small">Favicon: 16px minimum</text>
    <text x="0" y="60" class="small">Badge: 24px minimum, 64px preferred</text>
    <text x="0" y="86" class="small">Clear space: 0.25D around every mark</text>
    <text x="0" y="112" class="small">Filled circle, white internals, no effects</text>
  </g>

  <line x1="100" y1="540" x2="1700" y2="540" class="rule"/>

  <text x="100" y="594" class="section">Badge family</text>
  <text x="100" y="626" class="body">Same shell, same geometry, only the 2-letter code and category fill change.</text>

  <rect x="100" y="656" width="18" height="18" rx="4" fill="#1e3a5f"/>
  <text x="130" y="671" class="legend">Published tools</text>
  <rect x="320" y="656" width="18" height="18" rx="4" fill="#334155"/>
  <text x="350" y="671" class="legend">In development</text>
  <rect x="530" y="656" width="18" height="18" rx="4" fill="#1e3a8a"/>
  <text x="560" y="671" class="legend">Web apps</text>
  <rect x="680" y="656" width="18" height="18" rx="4" fill="#78350f"/>
  <text x="710" y="671" class="legend">Emberforge</text>

  <!-- Row 1: Published (ZF, iA, iV, Li, GN) -->
  <g transform="translate(220 830)">
    <use href="#badgeTile"/><use href="#badgeShell_pub"/><text x="0" y="14" class="badgeCode">ZF</text>
    <text x="0" y="116" class="badgeName">ZF</text>
    <text x="0" y="140" class="badgeMeta">Personal brand / homepage</text>
  </g>
  <g transform="translate(520 830)">
    <use href="#badgeTile"/><use href="#badgeShell_pub"/><text x="0" y="14" class="badgeCode">iA</text>
    <text x="0" y="116" class="badgeName">iAODE</text>
    <text x="0" y="140" class="badgeMeta">Neural ODE VAE for scATAC-seq</text>
  </g>
  <g transform="translate(820 830)">
    <use href="#badgeTile"/><use href="#badgeShell_pub"/><text x="0" y="14" class="badgeCode">iV</text>
    <text x="0" y="116" class="badgeName">iVAE</text>
    <text x="0" y="140" class="badgeMeta">Interpretable VAE for clustering</text>
  </g>
  <g transform="translate(1120 830)">
    <use href="#badgeTile"/><use href="#badgeShell_pub"/><text x="0" y="14" class="badgeCode">Li</text>
    <text x="0" y="116" class="badgeName">LiVAE</text>
    <text x="0" y="140" class="badgeMeta">Lorentz-regularized VAE</text>
  </g>
  <g transform="translate(1420 830)">
    <use href="#badgeTile"/><use href="#badgeShell_pub"/><text x="0" y="14" class="badgeCode">GN</text>
    <text x="0" y="116" class="badgeName">GNODEVAE</text>
    <text x="0" y="140" class="badgeMeta">Graph ODE-VAE for clustering</text>
  </g>

  <!-- Row 2: Published + Dev (RL, sF, CO, CC, MC) -->
  <g transform="translate(220 1080)">
    <use href="#badgeTile"/><use href="#badgeShell_pub"/><text x="0" y="14" class="badgeCode">RL</text>
    <text x="0" y="116" class="badgeName">scRL</text>
    <text x="0" y="140" class="badgeMeta">RL for cell fate decisions</text>
  </g>
  <g transform="translate(520 1080)">
    <use href="#badgeTile"/><use href="#badgeShell_pub"/><text x="0" y="14" class="badgeCode">sF</text>
    <text x="0" y="116" class="badgeName">scFocus</text>
    <text x="0" y="140" class="badgeMeta">SAC for lineage branching</text>
  </g>
  <g transform="translate(820 1080)">
    <use href="#badgeTile"/><use href="#badgeShell_pub"/><text x="0" y="14" class="badgeCode">CO</text>
    <text x="0" y="116" class="badgeName">CODE</text>
    <text x="0" y="140" class="badgeMeta">Correlated latent continuum</text>
  </g>
  <g transform="translate(1120 1080)">
    <use href="#badgeTile"/><use href="#badgeShell_dev"/><text x="0" y="14" class="badgeCode">CC</text>
    <text x="0" y="116" class="badgeName">CCVGAE</text>
    <text x="0" y="140" class="badgeMeta">Coupled variational graph AE</text>
  </g>
  <g transform="translate(1420 1080)">
    <use href="#badgeTile"/><use href="#badgeShell_dev"/><text x="0" y="14" class="badgeCode">MC</text>
    <text x="0" y="116" class="badgeName">MCCVAE</text>
    <text x="0" y="140" class="badgeMeta">Momentum contrastive coupling</text>
  </g>

  <!-- Row 3: Dev (GA, Lo, PD, PT, CD) -->
  <g transform="translate(220 1330)">
    <use href="#badgeTile"/><use href="#badgeShell_dev"/><text x="0" y="14" class="badgeCode">GA</text>
    <text x="0" y="116" class="badgeName">GAHIB</text>
    <text x="0" y="140" class="badgeMeta">Graph attention + hyperbolic IB</text>
  </g>
  <g transform="translate(520 1330)">
    <use href="#badgeTile"/><use href="#badgeShell_dev"/><text x="0" y="14" class="badgeCode">Lo</text>
    <text x="0" y="116" class="badgeName">Liora</text>
    <text x="0" y="140" class="badgeMeta">Lorentz ODE regularized VAE</text>
  </g>
  <g transform="translate(820 1330)">
    <use href="#badgeTile"/><use href="#badgeShell_dev"/><text x="0" y="14" class="badgeCode">PD</text>
    <text x="0" y="116" class="badgeName">PanODE-DPMM</text>
    <text x="0" y="140" class="badgeMeta">Flow-matching DPMM prior</text>
  </g>
  <g transform="translate(1120 1330)">
    <use href="#badgeTile"/><use href="#badgeShell_dev"/><text x="0" y="14" class="badgeCode">PT</text>
    <text x="0" y="116" class="badgeName">PanODE-Topic</text>
    <text x="0" y="140" class="badgeMeta">Flow-matching Dirichlet prior</text>
  </g>
  <g transform="translate(1420 1330)">
    <use href="#badgeTile"/><use href="#badgeShell_dev"/><text x="0" y="14" class="badgeCode">CD</text>
    <text x="0" y="116" class="badgeName">CLOP-DiT</text>
    <text x="0" y="140" class="badgeMeta">Language-omics + diffusion</text>
  </g>

  <!-- Row 4: Dev + Web (HS, Mo, SP, MR, LU) -->
  <g transform="translate(220 1580)">
    <use href="#badgeTile"/><use href="#badgeShell_dev"/><text x="0" y="14" class="badgeCode">HS</text>
    <text x="0" y="116" class="badgeName">HSDE</text>
    <text x="0" y="140" class="badgeMeta">Hyperbolic stochastic DEs</text>
  </g>
  <g transform="translate(520 1580)">
    <use href="#badgeTile"/><use href="#badgeShell_dev"/><text x="0" y="14" class="badgeCode">Mo</text>
    <text x="0" y="116" class="badgeName">MoCoO</text>
    <text x="0" y="140" class="badgeMeta">Momentum contrastive optim</text>
  </g>
  <g transform="translate(820 1580)">
    <use href="#badgeTile"/><use href="#badgeShell_web"/><text x="0" y="14" class="badgeCode">SP</text>
    <text x="0" y="116" class="badgeName">scportal</text>
    <text x="0" y="140" class="badgeMeta">Single-cell data portal</text>
  </g>
  <g transform="translate(1120 1580)">
    <use href="#badgeTile"/><use href="#badgeShell_web"/><text x="0" y="14" class="badgeCode">MR</text>
    <text x="0" y="116" class="badgeName">mrnapp</text>
    <text x="0" y="140" class="badgeMeta">mRNA intersection viz</text>
  </g>
  <g transform="translate(1420 1580)">
    <use href="#badgeTile"/><use href="#badgeShell_web"/><text x="0" y="14" class="badgeCode">LU</text>
    <text x="0" y="116" class="badgeName">liora-ui</text>
    <text x="0" y="140" class="badgeMeta">Benchmarking dashboard</text>
  </g>

  <!-- Row 5: sM + Emberforge (sM, EF, EC, EG, ET) -->
  <g transform="translate(220 1830)">
    <use href="#badgeTile"/><use href="#badgeShell_pub"/><text x="0" y="14" class="badgeCode">sM</text>
    <text x="0" y="116" class="badgeName">scMetaIntel</text>
    <text x="0" y="140" class="badgeMeta">LLM dataset discovery</text>
  </g>
  <g transform="translate(520 1830)">
    <use href="#badgeTile"/><use href="#badgeShell_ember"/><text x="0" y="14" class="badgeCode">EF</text>
    <text x="0" y="116" class="badgeName">emberforge</text>
    <text x="0" y="140" class="badgeMeta">Local-first coding forge</text>
  </g>
  <g transform="translate(820 1830)">
    <use href="#badgeTile"/><use href="#badgeShell_ember"/><text x="0" y="14" class="badgeCode">EC</text>
    <text x="0" y="116" class="badgeName">emberforge-cpp</text>
    <text x="0" y="140" class="badgeMeta">C++ translation</text>
  </g>
  <g transform="translate(1120 1830)">
    <use href="#badgeTile"/><use href="#badgeShell_ember"/><text x="0" y="14" class="badgeCode">EG</text>
    <text x="0" y="116" class="badgeName">emberforge-go</text>
    <text x="0" y="140" class="badgeMeta">Go translation</text>
  </g>
  <g transform="translate(1420 1830)">
    <use href="#badgeTile"/><use href="#badgeShell_ember"/><text x="0" y="14" class="badgeCode">ET</text>
    <text x="0" y="116" class="badgeName">emberforge-ts</text>
    <text x="0" y="140" class="badgeMeta">TypeScript translation</text>
  </g>

  <line x1="100" y1="2020" x2="1700" y2="2020" class="rule"/>
  <text x="100" y="2070" class="small">Filled dark circle = latent space / cell container. White trajectory arc = ODE flow / research path. Accent dots = graph vertices / observations.</text>
  <text x="100" y="2100" class="small">Bold white monospace code (44px) centered below the arc. All badges are self-contained and background-agnostic.</text>
</svg>
